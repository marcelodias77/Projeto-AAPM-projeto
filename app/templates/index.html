<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo — AAPM SENAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM MODERNIZADO --- */
        :root {
            --primary: #0066cc;
            --primary-gradient: linear-gradient(135deg, #0066cc, #3b82f6);
            --glitch-red: #ff003c;    /* Vermelho do glitch */
            --bg-base: #0f172a;       /* Dark slate moderno */
            --bg-surface: #1e293b;    /* Card Central */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            
            --radius-xl: 20px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- CONFIGURAÇÕES GERAIS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Iluminação ambiente de fundo */
        body::before {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.12;
            top: -100px;
            left: -100px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: var(--glitch-red);
            filter: blur(150px);
            opacity: 0.08;
            bottom: -100px;
            right: -100px;
            pointer-events: none;
        }

        /* --- CARD DE ENTRADA (GLASSMORPHISM) --- */
        .welcome-card {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            max-width: 440px;
            width: 100%;
            padding: 50px 40px;
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
            
            opacity: 0;
            transform: translateY(30px);
            animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Identidade Visual Reativa */
        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-gradient);
            color: white;
            font-weight: 800;
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            font-size: 1.3rem;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0, 102, 204, 0.4);
            position: relative;
            animation: logoPulse 2s ease-in-out infinite alternate;
        }

        /* --- ANIMAÇÃO GLITCH NAS LETRAS --- */
        .system-tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffffff; /* Letras brancas */
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
            position: relative;
            display: inline-block;
            animation: textGlitch 1.5s infinite linear alternate-reverse;
        }

        /* Estrutura de corte das letras para o efeito de erro */
        .system-tag::before, .system-tag::after,
        .glitch-title::before, .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #172237; 
        }

        .system-tag::before { clip: rect(10px, 9999px, 15px, 0); animation: glitch-anim 1.5s infinite linear alternate-reverse; }
        .system-tag::after { clip: rect(2px, 9999px, 8px, 0); animation: glitch-anim2 1.2s infinite linear alternate-reverse; }

        .glitch-title {
            font-size: 1.85rem;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            position: relative;
            display: inline-block;
            animation: textGlitch 2s infinite linear alternate-reverse;
        }

        .glitch-title::before { clip: rect(20px, 9999px, 25px, 0); animation: glitch-anim 2s infinite linear alternate-reverse; }
        .glitch-title::after { clip: rect(5px, 9999px, 15px, 0); animation: glitch-anim2 1.5s infinite linear alternate-reverse; }

        p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 36px;
        }

        /* --- CONTAINER DE BOTÕES --- */
        .acoes-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            overflow: hidden;
        }

        /* Botão Primário: Entrar (Sem efeitos cyber/glitch/shine de hover) */
        .btn-entrar {
            background: var(--primary-gradient);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 14px rgba(0, 102, 204, 0.3);
        }

        /* Hover Limpo e Estabilidade Padrão */
        .btn-entrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.45);
            filter: brightness(1.05);
        }

        .btn-entrar:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(0, 102, 204, 0.4);
        }

        /* Botão Secundário: Criar Conta (Estilo Hollow Glow) */
        .btn-cadastro {
            background-color: rgba(15, 23, 42, 0.2);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-cadastro:hover {
            background-color: rgba(59, 130, 246, 0.05);
            border-color: #3b82f6;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            transform: translateY(-1px);
        }

        .btn-cadastro:active {
            transform: translateY(1px);
        }

        /* --- KEYFRAMES --- */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes logoPulse {
            from { transform: scale(1); box-shadow: 0 8px 24px rgba(0, 102, 204, 0.4); }
            to { transform: scale(1.05); box-shadow: 0 8px 32px rgba(59, 130, 246, 0.7); }
        }

        /* Deslocamento cromático acelerado */
        @keyframes textGlitch {
            0% { text-shadow: 1.5px 0 0 var(--glitch-red), -1.5px 0 0 #00f0ff; }
            4% { text-shadow: -3px 0 0 var(--glitch-red), 3px 0 0 #00f0ff; }
            8% { text-shadow: 1.5px 0 0 var(--glitch-red), -1.5px 0 0 #00f0ff; }
            100% { text-shadow: 1px 0 0 var(--glitch-red), -1px 0 0 #00f0ff; }
        }

        /* Cortes de linhas muito dinâmicos */
        @keyframes glitch-anim {
            0% { clip: rect(12px, 9999px, 25px, 0); transform: skew(0.3deg); }
            10% { clip: rect(30px, 9999px, 5px, 0); transform: skew(-0.5deg); }
            20% { clip: rect(8px, 9999px, 42px, 0); transform: skew(0.8deg); }
            30% { clip: rect(38px, 9999px, 15px, 0); transform: skew(-0.2deg); }
            40% { clip: rect(25px, 9999px, 35px, 0); transform: skew(1deg); }
            50% { clip: rect(3px, 9999px, 14px, 0); transform: skew(-0.7deg); }
            60% { clip: rect(18px, 9999px, 28px, 0); transform: skew(0.4deg); }
            100% { clip: rect(10px, 9999px, 22px, 0); transform: skew(0deg); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(5px, 9999px, 18px, 0); transform: translateX(-1px); }
            15% { clip: rect(42px, 9999px, 32px, 0); transform: translateX(2px); }
            30% { clip: rect(2px, 9999px, 15px, 0); transform: translateX(-2px); }
            45% { clip: rect(15px, 9999px, 45px, 0); transform: translateX(1px); }
            60% { clip: rect(28px, 9999px, 20px, 0); transform: translateX(-1px); }
            100% { clip: rect(5px, 9999px, 12px, 0); transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        
        <div class="logo-box">S</div>
        
        <div class="header-box">
            <div class="system-tag" data-text="AAPM SENAI">AAPM SENAI</div>
            <br>
            <h1 class="glitch-title" data-text="Controle de Estoque">Controle de Estoque</h1>
        </div>
        
        <p>Acesse o painel administrativo para monitorar movimentações, gerenciar produtos ou operar a frente de caixa.</p>

        <div class="acoes-container">
            <a href="/auth/login" class="btn btn-entrar">
                Entrar no Sistema
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
            <a href="/auth/cadastro" class="btn btn-cadastro">Criar Nova Conta</a>
        </div>

    </div>

</body>
</html>
