<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo — AAPM SENAI</title>
    <style>
        /* --- VARIÁVEIS DE CORES INSTITUCIONAIS --- */
        :root {
            --primary: #0066cc;       /* Azul Institucional SENAI */
            --primary-hover: #004da3;
            --bg-body: #f4f6f9;       /* Fundo suave */
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e2e8f0;
        }

        /* --- CONFIGURAÇÕES GERAIS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- CARD DE ENTRADA --- */
        .welcome-card {
            background: var(--bg-card);
            max-width: 420px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        /* Identidade e Títulos */
        .logo-placeholder {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.75rem;
            color: #111111;
            font-weight: 700;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        /* --- CONTAINER DE BOTÕES --- */
        .acoes-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s, transform 0.1s;
            cursor: pointer;
        }

        /* Botão Primário: Entrar */
        .btn-entrar {
            background-color: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 102, 204, 0.15);
        }

        .btn-entrar:hover {
            background-color: var(--primary-hover);
        }

        .btn-entrar:active {
            transform: scale(0.99);
        }

        /* Botão Secundário: Criar Conta */
        .btn-cadastro {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--border-color);
        }

        .btn-cadastro:hover {
            background-color: rgba(0, 102, 204, 0.04);
            border-color: var(--primary);
        }

        .btn-cadastro:active {
            transform: scale(0.99);
        }
    </style>
</head>
<body>

    <!-- Caixa Central de Boas-vindas -->
    <div class="welcome-card">
        
        <!-- Identificação do Sistema -->
        <div class="logo-placeholder">AAPM SENAI</div>
        
        <h1>Controle de Estoque</h1>
        <p>Faça login ou cadastre-se para gerenciar o catálogo e os usuários do sistema.</p>

        <!-- Ações Principais -->
        <div class="acoes-container">
            <a href="/auth/login" class="btn btn-entrar">Entrar no Sistema</a>
            <a href="/auth/cadastro" class="btn btn-cadastro">Criar Nova Conta</a>
        </div>

    </div>

</body>
</html>
