<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ "Editar" if editando else "Novo" }} Produto — AAPM SENAI</title>
    <style>
        /* --- VARIÁVEIS DE CORES INSTITUCIONAIS --- */
        :root {
            --primary: #0066cc;       /* Azul Institucional SENAI */
            --primary-hover: #004da3;
            --bg-body: #f4f6f9;       /* Fundo suave */
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e2e8f0;
            
            /* Status */
            --danger: #ef4444;
            --danger-bg: #fee2e2;
        }

        /* --- CONFIGURAÇÕES GERAIS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.6rem;
            color: #111111;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        /* --- ALERTAS --- */
        .alerta-erro {
            background-color: var(--danger-bg);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        /* --- ESTRUTURA DO FORMULÁRIO --- */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fafafa;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
            background-color: #ffffff;
        }

        /* Input específico de Arquivos */
        input[type="file"] {
            display: block;
            width: 100%;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* --- PREVISÃO DA IMAGEM --- */
        .imagem-preview-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: #f8fafc;
            padding: 12px;
            border-radius: 6px;
            border: 1px dashed var(--border-color);
            margin-bottom: 5px;
        }

        .img-miniatura {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: #fff;
        }

        .img-label-info {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* --- CONTAINER DE BOTÕES / AÇÕES --- */
        .form-acoes {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        button[type="submit"] {
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 4px rgba(0, 102, 204, 0.15);
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        .btn-cancelar {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .btn-cancelar:hover {
            color: var(--danger);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>{{ "Editar produto" if editando else "Novo produto" }}</h1>

        {% if erro %}
            <div class="alerta-erro">
                ⚠️ {{ erro }}
            </div>
        {% endif %}

        <form action="{{ '/produtos/' + editando.id|string + '/editar' if editando else '/produtos/novo' }}"
              method="post"
              enctype="multipart/form-data">

            <div class="form-group">
                <label for="nome">Nome do Produto</label>
                <input type="text"
                       id="nome"
                       name="nome"
                       value="{{ editando.nome if editando else (valores.nome if valores else '') }}"
                       placeholder="Ex: Camiseta AAPM"
                       required>
            </div>

            <div class="form-group">
                <label for="preco">Preço (R$)</label>
                <input type="number"
                       id="preco"
                       name="preco"
                       step="0.01"
                       min="0"
                       value="{{ editando.preco if editando else (valores.preco if valores else '0.00') }}"
                       required>
            </div>

            <div class="form-group">
                <label for="estoque_atual">Estoque Atual</label>
                <input type="number"
                       id="estoque_atual"
                       name="estoque_atual"
                       min="0"
                       value="{{ editando.estoque_atual if editando else (valores.estoque_atual if valores else '0') }}"
                       required>
            </div>

            <div class="form-group">
                <label for="categoria_id">Categoria</label>
                <select id="categoria_id" name="categoria_id">
                    <option value="0">Sem categoria</option>
                    {% for c in categorias %}
                        <option value="{{ c.id }}"
                            {{ 'selected' if (editando and editando.categoria_id == c.id) or (valores and valores.categoria_id == c.id) else '' }}>
                            {{ c.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                {% if editando and editando.imagem_path %}
                    <label>Imagem Cadastrada</label>
                    <div class="imagem-preview-container">
                        <img src="{{ editando.imagem_url }}" alt="{{ editando.nome }}" class="img-miniatura">
                        <span class="img-label-info">Modifique enviando um novo arquivo abaixo se desejar.</span>
                    </div>
                {% endif %}

                <label for="imagem">
                    {{ "Substituir Imagem" if editando else "Imagem do Produto" }}
                </label>
                <input type="file"
                       id="imagem"
                       name="imagem"
                       accept=".jpg,.jpeg,.png,.webp">
            </div>

            <div class="form-acoes">
                <a href="/produtos" class="btn-cancelar">Cancelar</a>
                <button type="submit">
                    {{ "Salvar alterações" if editando else "Criar produto" }}
                </button>
            </div>
        </form>

    </div>

</body>
</html>
