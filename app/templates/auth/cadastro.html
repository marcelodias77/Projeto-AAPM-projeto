<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta — AAPM SENAI</title>
    <style>
        /* --- VARIÁVEIS DE CORES INSTITUCIONAIS --- */
        :root {
            --primary: #0066cc;       /* Azul Institucional SENAI */
            --primary-hover: #004da3;
            --bg-body: #f4f6f9;       /* Fundo suave */
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e2e8f0;
            
            /* Status */
            --danger: #ef4444;
            --danger-bg: #fee2e2;
        }

        /* --- CONFIGURAÇÕES GERAIS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- CARD DE CADASTRO --- */
        .cadastro-card {
            background: var(--bg-card);
            max-width: 400px;
            width: 100%;
            padding: 35px 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .logo-header {
            font-size: 1rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            color: #111111;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }

        /* --- ALERTAS DE ERRO --- */
        .alerta-erro {
            background-color: var(--danger-bg);
            color: var(--danger);
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        /* --- FORMULÁRIO --- */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fafafa;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
            background-color: #ffffff;
        }

        /* Botão de Envio */
        button[type="submit"] {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0, 102, 204, 0.15);
            margin-top: 25px;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
        }

        button[type="submit"]:active {
            transform: scale(0.99);
        }

        /* Rodapé do Card */
        .card-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .card-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="cadastro-card">
        <div class="logo-header">AAPM SENAI</div>
        <h1>Criar Nova Conta</h1>

        {% if erro %}
            <div class="alerta-erro">
                ⚠️ {{ erro }}
            </div>
        {% endif %}

        <form action="/auth/cadastro" method="post">
            
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" 
                       id="nome" 
                       name="nome" 
                       placeholder="Seu nome e sobrenome" 
                       required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" 
                       id="email" 
                       name="email" 
                       placeholder="seu.email@exemplo.com" 
                       required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" 
                       id="senha" 
                       name="senha" 
                       placeholder="Crie uma senha segura" 
                       required 
                       minlength="6">
            </div>

            <button type="submit">Cadastrar Conta</button>
        </form>

        <div class="card-footer">
            Já tem uma conta? <a href="/auth/login">Entrar</a>
        </div>
    </div>

</body>
</html>
