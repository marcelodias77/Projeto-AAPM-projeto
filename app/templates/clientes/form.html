<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ "Editar" if editando else "Novo" }} Cliente — AAPM SENAI</title>
    <style>
        /* --- DESIGN SYSTEM MODERNIZADO (DARK-PREMIUM) --- */
        :root {
            --primary: #0066cc;
            --primary-gradient: linear-gradient(135deg, #0066cc, #3b82f6);
            --bg-base: #0f172a;       /* Fundo escuro slate */
            --bg-surface: rgba(30, 41, 59, 0.7); /* Vidro fosco card */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            
            /* Status e Alertas */
            --danger: #f43f5e;
            --danger-bg: rgba(244, 63, 94, 0.15);
            --danger-border: rgba(244, 63, 94, 0.3);
            
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --success-border: rgba(16, 185, 129, 0.25);
            
            --radius-xl: 20px;
            --radius-md: 12px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- CONFIGURAÇÕES GERAIS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 24px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Iluminação radial de fundo */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--primary);
            filter: blur(160px);
            opacity: 0.12;
            bottom: -150px;
            left: -150px;
            pointer-events: none;
        }

        /* --- CONTAINER PRINCIPAL (GLASSMORPHISM) --- */
        .container {
            max-width: 600px;
            width: 100%;
            background-color: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px 36px;
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        h1 {
            font-size: 1.65rem;
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 28px;
            letter-spacing: -0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
        }

        /* --- ALERTAS / FEEDBACKS --- */
        .alert-danger {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            font-size: 0.9rem;
            font-weight: 500;
            background-color: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- FORMULÁRIO --- */
        .form-group {
            margin-bottom: 22px;
        }

        label.field-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 13px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: rgba(15, 23, 42, 0.4);
            transition: var(--transition);
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background-color: rgba(15, 23, 42, 0.8);
        }

        /* Caixa de Destaque do Checkbox (Associado) */
        .checkbox-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background-color: var(--success-bg);
            color: #a7f3d0; /* Tom verde pastel claro para leitura no dark */
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--success-border);
            margin-top: 14px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.92rem;
            user-select: none;
            transition: var(--transition);
        }

        .checkbox-card:hover {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .checkbox-card input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--success);
            cursor: pointer;
            flex-shrink: 0;
        }

        /* --- BOTÕES E AÇÕES --- */
        .actions-group {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-gradient);
            color: #ffffff;
            padding: 13px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0, 102, 204, 0.25);
            transition: var(--transition);
        }

        .btn-submit:hover {
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.4);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .btn-cancel {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: var(--transition);
            padding: 8px 12px;
        }

        .btn-cancel:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>{{ "Editar cliente" if editando else "Novo cliente" }}</h1>

        {% if erro %}
            <div class="alert alert-danger">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ erro }}
            </div>
        {% endif %}
        
        {% if request.query_params.get('erro') == 'matricula' %}
            <div class="alert alert-danger">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Esta matrícula já está em uso.
            </div>
        {% endif %}

        <form action="{{ '/clientes/' + editando.id|string + '/editar' if editando else '/clientes/novo' }}" method="post">
            
            <div class="form-group">
                <label for="nome" class="field-label">Nome completo</label>
                <input type="text" 
                       id="nome" 
                       name="nome" 
                       required 
                       autofocus
                       value="{{ editando.nome if editando else (valores.nome if valores else '') }}"
                       placeholder="Digite o nome completo do cliente">
            </div>

            <div class="form-group">
                <label for="matricula" class="field-label">Matrícula SENAI <span style="font-weight: normal; color: var(--text-muted); text-transform: lowercase;">(opcional)</span></label>
                <input type="text" 
                       id="matricula" 
                       name="matricula"
                       placeholder="Ex: 2026001"
                       value="{{ editando.matricula if editando else (valores.matricula if valores else '') }}">
            </div>

            <div class="form-group">
                <label for="telefone" class="field-label">Telefone <span style="font-weight: normal; color: var(--text-muted); text-transform: lowercase;">(opcional)</span></label>
                <input type="text" 
                       id="telefone" 
                       name="telefone"
                       placeholder="Ex: (11) 99999-9999"
                       value="{{ editando.telefone if editando else (valores.telefone if valores else '') }}">
            </div>

            <div class="form-group">
                <label class="checkbox-card" for="is_associado">
                    <input type="checkbox" 
                           id="is_associado" 
                           name="is_associado" 
                           value="true"
                           {{ 'checked' if (editando and editando.is_associado) or (valores and valores.is_associado) }}>
                    <span>É associado AAPM (recebe 10% de desconto em compras)</span>
                </label>
            </div>

            <div class="actions-group">
                <button type="submit" class="btn-submit">
                    {{ "Salvar alterações" if editando else "Cadastrar cliente" }}
                </button>
                <a href="/clientes" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>

</body>
</html>
