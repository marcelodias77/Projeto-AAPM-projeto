<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Movimentação — AAPM SENAI</title>
    <style>
        /* --- DESIGN SYSTEM MODERNIZADO (DARK-PREMIUM) --- */
        :root {
            --primary: #0066cc;
            --primary-gradient: linear-gradient(135deg, #0066cc, #3b82f6);
            --bg-base: #0f172a;       /* Fundo escuro slate */
            --bg-surface: rgba(30, 41, 59, 0.7); /* Vidro fosco card */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            
            /* Status e Alertas */
            --danger: #f43f5e;
            --danger-bg: rgba(244, 63, 94, 0.15);
            --danger-border: rgba(244, 63, 94, 0.3);
            
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --success-border: rgba(16, 185, 129, 0.25);

            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.12);
            --warning-border: rgba(245, 158, 11, 0.3);
            
            --radius-xl: 20px;
            --radius-md: 12px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- CONFIGURAÇÕES GERAIS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 24px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Iluminação radial de fundo */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--primary);
            filter: blur(160px);
            opacity: 0.12;
            bottom: -150px;
            right: -150px;
            pointer-events: none;
        }

        /* --- CONTAINER PRINCIPAL (GLASSMORPHISM) --- */
        .container {
            max-width: 650px;
            width: 100%;
            background-color: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px 36px;
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        h1 {
            font-size: 1.65rem;
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 28px;
            letter-spacing: -0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
        }

        /* --- ALERTAS --- */
        .alert-danger {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            font-size: 0.9rem;
            font-weight: 500;
            background-color: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- FORMULÁRIO --- */
        .form-group {
            margin-bottom: 22px;
        }

        label.field-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 13px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: rgba(15, 23, 42, 0.4);
            transition: var(--transition);
            outline: none;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background-color: rgba(15, 23, 42, 0.8);
        }

        /* Força fundo escuro nativo nas opções do select */
        select option {
            background-color: #1e293b;
            color: var(--text-main);
        }

        /* --- CARDS INFORMATIVOS DINÂMICOS --- */
        .status-card {
            padding: 14px 16px;
            border-radius: var(--radius-md);
            font-size: 0.92rem;
            margin-top: -10px;
            margin-bottom: 22px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-stock {
            background-color: rgba(255, 255, 255, 0.04);
            color: #e2e8f0;
            border: 1px solid var(--border-color);
        }

        .card-subtotal {
            background-color: var(--success-bg);
            color: #a7f3d0;
            border: 1px solid var(--success-border);
            font-size: 1.05rem;
        }

        /* --- BOTÕES E AÇÕES --- */
        .actions-group {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-gradient);
            color: #ffffff;
            padding: 13px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0, 102, 204, 0.25);
            transition: var(--transition);
        }

        .btn-submit:hover {
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.4);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .btn-cancel {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: var(--transition);
            padding: 8px 12px;
        }

        .btn-cancel:hover {
            color: var(--text-main);
        }

        /* --- ANIMAÇÕES E RESPONSIVIDADE --- */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            body { padding: 16px 12px; }
            .container { padding: 30px 20px; }
            .actions-group {
                flex-direction: column-reverse;
                align-items: stretch;
                gap: 12px;
            }
            .btn-submit, .btn-cancel { text-align: center; padding: 14px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Registrar movimentação</h1>

        {% if erro %}
            <div class="alert alert-danger">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ erro }}
            </div>
        {% endif %}

        <form action="/movimentacoes/nova" method="post">

            <div class="form-group">
                <label for="select-produto" class="field-label">Produto</label>
                <select name="produto_id" required id="select-produto">
                    <option value="">Selecione um produto...</option>
                    {% for p in produtos %}
                        <option value="{{ p.id }}"
                                data-estoque="{{ p.estoque_atual }}"
                                data-preco="{{ p.preco }}"
                            {{ 'selected' if produto_id == p.id else '' }}>
                            {{ p.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div id="info-estoque" class="status-card card-stock" style="display:none">
                <span id="icone-estoque">ℹ️</span> Estoque atual deste produto: <strong id="valor-estoque">0</strong> unidades.
            </div>

            <div class="form-group">
                <label for="select-tipo" class="field-label">Tipo de Movimentação</label>
                <select name="tipo" required id="select-tipo">
                    <option value="">Selecione o tipo...</option>
                    {% for t in tipos %}
                        <option value="{{ t.value }}">
                            {{ "▲ Entrada (Abastecimento)" if t.value == 'entrada' else "▼ Saída (Venda/Consumo)" }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="input-quantidade" class="field-label">Quantidade</label>
                <input type="number"
                       name="quantidade"
                       min="1"
                       required
                       id="input-quantidade"
                       placeholder="Ex: 10">
            </div>

            <div class="form-group">
                <label for="input-preco" class="field-label">Preço unitário (R$)</label>
                <input type="number"
                       name="preco_unitario"
                       step="0.01"
                       min="0"
                       required
                       id="input-preco"
                       placeholder="0,00">
            </div>

            <div id="info-subtotal" class="status-card card-subtotal" style="display:none">
                <span>💰</span> Valor Total do Lote: <strong id="valor-subtotal">R$ 0,00</strong>
            </div>

            <div class="form-group">
                <label for="observacao" class="field-label">Observação <span style="font-weight: normal; color: var(--text-muted); text-transform: lowercase;">(opcional)</span></label>
                <input type="text"
                       id="observacao"
                       name="observacao"
                       maxlength="255"
                       placeholder="Ex: Compra do fornecedor X, Venda direta balcão...">
            </div>

            <div class="actions-group">
                <button type="submit" class="btn-submit">Registrar Movimentação</button>
                <a href="/movimentacoes" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>

    <script>
        const selectProduto  = document.getElementById('select-produto');
        const inputQuantidade = document.getElementById('input-quantidade');
        const inputPreco     = document.getElementById('input-preco');
        const infoEstoque    = document.getElementById('info-estoque');
        const valorEstoque   = document.getElementById('valor-estoque');
        const iconeEstoque   = document.getElementById('icone-estoque');
        const infoSubtotal   = document.getElementById('info-subtotal');
        const valorSubtotal  = document.getElementById('valor-subtotal');

        selectProduto.addEventListener('change', function () {
            const option = this.options[this.selectedIndex];
            const estoque = option.dataset.estoque;
            const preco   = option.dataset.preco;

            if (estoque !== undefined && this.value !== "") {
                valorEstoque.textContent = estoque;
                infoEstoque.style.display = 'flex'; 

                // Alerta dinâmico se o estoque estiver zerado no padrão Dark Premium
                if (parseInt(estoque) === 0) {
                    infoEstoque.style.backgroundColor = 'var(--warning-bg)';
                    infoEstoque.style.color = '#fcd34d'; /* Amarelo ouro suave */
                    infoEstoque.style.borderColor = 'var(--warning-border)';
                    iconeEstoque.textContent = '⚠️';
                } else {
                    // Reseta para o padrão estilizado do CSS
                    infoEstoque.removeAttribute('style');
                    infoEstoque.style.display = 'flex';
                    infoEstoque.className = "status-card card-stock";
                    iconeEstoque.textContent = 'ℹ️';
                }

                inputPreco.value = parseFloat(preco).toFixed(2);
            } else {
                infoEstoque.style.display = 'none';
            }

            atualizarSubtotal();
        });

        function atualizarSubtotal() {
            const qtd   = parseFloat(inputQuantidade.value) || 0;
            const preco = parseFloat(inputPreco.value) || 0;
            const total = qtd * preco;

            if (qtd > 0 && preco > 0) {
                valorSubtotal.textContent = total.toLocaleString('pt-BR', {
                    style: 'currency',
                    currency: 'BRL'
                });
                infoSubtotal.style.display = 'flex';
            } else {
                infoSubtotal.style.display = 'none';
            }
        }

        inputQuantidade.addEventListener('input', atualizarSubtotal);
        inputPreco.addEventListener('input', atualizarSubtotal);
    </script>
</body>
</html>
